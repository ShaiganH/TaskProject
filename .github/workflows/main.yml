name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Backend image
    - name: Build & Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./Backend/Task_Backend
        push: true
        tags: shaigan54/taskapp-backend:latest

    # Frontend image
    - name: Build & Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./Frontend
        push: true
        tags: shaigan54/taskapp-frontend:latest

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker compose down
          docker compose pull
          docker compose up -d
        
